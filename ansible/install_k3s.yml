---
- name: Installer k3s sur le noeud master
  hosts: master
  become: true

  tasks:
    - name: Installer k3s (control plane)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_SELINUX_RPM=true sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Attendre que k3s soit prêt
      wait_for:
        port: 6443
        timeout: 120

    - name: Récupérer le token k3s
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Récupérer le kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./k3s.yaml
        flat: yes

    - name: Afficher le token (pour le worker)
      debug:
        msg: "TOKEN = {{ k3s_token.stdout }}"

    - name: Vérifier les noeuds
      command: /usr/local/bin/k3s kubectl get nodes
      register: nodes_status

    - name: Afficher les noeuds
      debug:
        msg: "{{ nodes_status.stdout }}"

- name: Joindre le worker au cluster k3s
  hosts: worker
  become: true

  tasks:
    - name: Joindre le cluster k3s
      shell: >
        curl -sfL https://get.k3s.io |
        INSTALL_K3S_SKIP_SELINUX_RPM=true
        K3S_URL=https://{{ hostvars['k8s-master']['ansible_host'] }}:6443
        K3S_TOKEN={{ hostvars['k8s-master']['k3s_token']['stdout'] }}
        sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Attendre que k3s-agent démarre
      wait_for:
        timeout: 30

    - name: Vérifier que k3s-agent tourne
      systemd:
        name: k3s-agent
        state: started
        enabled: true

- name: Vérifier le cluster depuis le master
  hosts: master
  become: true

  tasks:
    - name: Attendre que le worker rejoigne
      wait_for:
        timeout: 30

    - name: Vérifier tous les noeuds
      command: /usr/local/bin/k3s kubectl get nodes
      register: all_nodes

    - name: Afficher tous les noeuds
      debug:
        msg: "{{ all_nodes.stdout }}"